<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WebTrade CRM</title><style>*{box-sizing:border-box}body{margin:0;background:#060d1a;color:#c5d0e8;font-family:Courier New,monospace}.app{height:100vh;display:flex;flex-direction:column}.top{background:#0b1525;border-bottom:1px solid #1a2840;padding:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}.main{flex:1;display:flex;min-height:0}.side{width:220px;background:#050b16;border-right:1px solid #1a2840;overflow:auto}.right{width:270px;background:#050b16;border-left:1px solid #1a2840;overflow:auto}.content{flex:1;padding:12px;min-width:0}.item{padding:11px;border-bottom:1px solid #0d1525;cursor:pointer;color:#5a6e8a}.item.active{background:#0c1e35;color:#63b3ed}.panel{background:#08111e;border:1px solid #1a2840;padding:12px}.btn{background:transparent;border:1px solid #1a2840;color:#3d546e;padding:7px 9px;cursor:pointer;margin:2px}.green{border-color:#00d4a0;color:#00d4a0}.red{border-color:#f05e5e;color:#f05e5e}.blue{border-color:#63b3ed;color:#63b3ed}.yellow{border-color:#f6ad55;color:#f6ad55}.input{width:100%;background:#0d1a2a;border:1px solid #1a2840;color:#c5d0e8;padding:8px}.login{height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at top,#0b1f35,#050b16 70%)}.metric{display:inline-block;text-align:center;margin:0 8px}.metric small{display:block;color:#5a6e8a}.chartBox{height:500px;background:#08111e;border:1px solid #1a2840;padding:10px;display:flex;flex-direction:column}.chartHead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:10px}.tfbar{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px}.tfbtn{font-size:11px;padding:4px 7px;border:1px solid #1a2840;background:#060d1a;color:#5a6e8a;cursor:pointer}.tfbtn.active{border-color:#63b3ed;color:#63b3ed;background:#0c1e35}.price{color:#63b3ed;font-size:22px;font-weight:bold}.chartWrap{flex:1;min-height:390px;background:#060d1a;border:1px solid #0d1525;overflow:hidden}#chartSvg{width:100%;height:100%;display:block}.tabs{display:flex;background:#08111e;border:1px solid #1a2840;border-top:0}.tab{padding:8px 12px;border:0;background:transparent;color:#5a6e8a;cursor:pointer}.tab.active{color:#63b3ed;border-bottom:2px solid #63b3ed}.scroll{height:155px;overflow:auto;background:#08111e;border:1px solid #1a2840;border-top:0}.table{width:100%;border-collapse:collapse}.table td,.table th{border-bottom:1px solid #0d1525;padding:6px;font-size:12px;text-align:left}.warn{background:#1f1606;border:1px solid #f6ad55;color:#f6ad55;padding:8px;margin:8px 0}.error{background:#2a0d0d;border:1px solid #f05e5e;color:#f05e5e;padding:8px;margin:8px 0}@media(max-width:900px){.main{display:block;overflow:auto}.side,.right{width:100%;max-height:260px}.app{height:auto;min-height:100vh}.top{flex-wrap:wrap}.chartBox{height:460px}.chartWrap{min-height:350px}}</style></head><body><div id="app"></div><script>const $=id=>document.getElementById(id);const app=$('app');let page='login',asset='EUR/USD',side='BUY',tab='open',tf='M5',tickCount=0,balance=1250,positions=[],closed=[],money=[];const A=[['EUR/USD',1.0854],['GBP/USD',1.2687],['USD/JPY',151.34],['XAU/USD',3042.15],['XAG/USD',27.55],['BTC/USD',84210],['ETH/USD',3120],['US30',38200],['NAS100',18200],['AAPL',185],['TSLA',210]];const TFS=['M1','M5','M15','M30','H1','H4','D1','W1'];const TICK={M1:3,M5:5,M15:8,M30:10,H1:12,H4:15,D1:18,W1:22};const VOL={M1:.0006,M5:.001,M15:.0015,M30:.002,H1:.003,H4:.004,D1:.006,W1:.009};let P={},C={};function key(sym=asset,t=tf){return sym+'_'+t}function init(){A.forEach(a=>{if(!P[a[0]])P[a[0]]=a[1];TFS.forEach(t=>{let k=key(a[0],t);if(!C[k]){let q=a[1],arr=[],v=VOL[t];for(let i=0;i<70;i++){let o=q,c=o+(Math.random()-.5)*a[1]*v,h=Math.max(o,c)+Math.random()*a[1]*v*.4,l=Math.min(o,c)-Math.random()*a[1]*v*.4;arr.push({o,h,l,c});q=c}C[k]=arr}})})}function price(){return P[asset]||1}function fmt(n){return Number(n||0).toFixed(Number(n)>100?2:5)}function pnl(){return positions.reduce((s,p)=>s+(p.pnl||0),0)}function margin(){return positions.reduce((s,p)=>s+(p.margin||0),0)}function free(){return balance+pnl()-margin()}function size(){if(asset.includes('XAU'))return 100;if(asset.includes('XAG'))return 5000;if(asset.includes('/'))return 100000;return 1}function units(l){return Number(l||0)*size()}function req(l,pr){return units(l)*Number(pr||price())/2000}function save(){localStorage.setItem('webtrade_inline_v3',JSON.stringify({balance,positions,closed,money,tf}))}function load(){try{let s=JSON.parse(localStorage.getItem('webtrade_inline_v3'));if(s){balance=s.balance||1250;positions=s.positions||[];closed=s.closed||[];money=s.money||[];tf=s.tf||'M5'}}catch(e){}}function login(){let u=$('u').value.trim(),p=$('p').value.trim();if((u==='admin'||u==='cliente')&&p==='123456'){page='trade';render()}else{$('err').style.display='block'}}function renderLogin(){app.innerHTML='<div class="login"><div class="panel" style="width:380px"><h2 style="color:#00d4a0;text-align:center">FOREX ACCESS</h2><input id="u" class="input" placeholder="Usuario"><br><br><input id="p" class="input" type="password" placeholder="Contraseña"><div id="err" class="error" style="display:none">Credenciales incorrectas</div><br><button id="loginBtn" class="btn green" style="width:100%;padding:12px">ENTRAR</button><p style="font-size:11px;color:#5a6e8a;text-align:center">admin / 123456 · cliente / 123456</p></div></div>';$('loginBtn').onclick=login}function render(){if(page==='login'){renderLogin();return}app.innerHTML='<div class="app"><div class="top"><div><b style="color:#00d4a0">WEBTRADE</b><br><button id="outBtn" class="btn red">CERRAR SESIÓN</button></div><div><button id="depBtn" class="btn green">+$ DEPÓSITO</button><button id="retBtn" class="btn yellow">-$ RETIRO</button></div><div>'+[['Balance',balance],['Equity',balance+pnl()],['Margin',margin()],['Free Margin',free()],['P&L',pnl()]].map(x=>'<span class="metric"><small>'+x[0]+'</small><b>$'+x[1].toFixed(2)+'</b></span>').join('')+'</div></div><div class="main"><div class="side" id="assets"></div><div class="content"><div class="chartBox"><div class="chartHead"><div><b>'+asset+'</b><div style="color:#5a6e8a;font-size:11px">Temporalidad: '+tf+' · Gráfica dinámica SVG</div><div class="tfbar" id="tfbar"></div></div><div class="price">'+fmt(price())+'</div></div><div class="chartWrap"><svg id="chartSvg" viewBox="0 0 1000 390" preserveAspectRatio="none"></svg></div></div><div class="tabs"><button id="tabOpen" class="tab">Abiertas</button><button id="tabClosed" class="tab">Cerradas</button><button id="tabMoney" class="tab">Dinero</button></div><div id="tabbox" class="scroll"></div></div><div class="right"><div class="panel"><h3>Nueva orden</h3><div style="display:flex;gap:6px"><button id="buyBtn" class="btn green" style="flex:1">BUY</button><button id="sellBtn" class="btn red" style="flex:1">SELL</button></div><br><label>Tipo de orden</label><select id="otype" class="input"><option value="market">Tiempo de mercado</option><option value="pending">Cuando llegue a precio</option></select><br><br><label>Precio entrada</label><input id="entry" class="input" type="number" value="'+price()+'"><br><br><label>Lotes</label><input id="lots" class="input" type="number" step="0.01" value="0.01"><br><br><label>Stop Loss</label><input id="sl" class="input" type="number" placeholder="Opcional"><br><br><label>Take Profit</label><input id="tp" class="input" type="number" placeholder="Opcional"><div id="oinfo" class="warn"></div><div id="oerr" class="error" style="display:none"></div><button id="execBtn" class="btn blue" style="width:100%;padding:10px">CONFIRMAR '+side+'</button></div></div></div></div>';$('outBtn').onclick=()=>{page='login';render()};$('depBtn').onclick=()=>moneyForm('Depósito');$('retBtn').onclick=()=>moneyForm('Retiro');$('buyBtn').onclick=()=>{side='BUY';render()};$('sellBtn').onclick=()=>{side='SELL';render()};$('execBtn').onclick=order;['otype','entry','lots','sl','tp'].forEach(id=>$(id).oninput=orderInfo);$('tabOpen').onclick=()=>{tab='open';tabs()};$('tabClosed').onclick=()=>{tab='closed';tabs()};$('tabMoney').onclick=()=>{tab='money';tabs()};let tfbar=$('tfbar');TFS.forEach(t=>{let b=document.createElement('button');b.className='tfbtn '+(t===tf?'active':'');b.textContent=t;b.onclick=()=>{tf=t;save();render()};tfbar.appendChild(b)});let list=$('assets');A.forEach(a=>{let d=document.createElement('div');d.className='item '+(a[0]===asset?'active':'');d.innerHTML=a[0]+'<br><small>'+fmt(P[a[0]]||a[1])+'</small>';d.onclick=()=>{asset=a[0];render()};list.appendChild(d)});orderInfo();draw();tabs()}function orderInfo(){let lotsEl=$('lots'),otypeEl=$('otype'),entryEl=$('entry'),slEl=$('sl'),tpEl=$('tp'),infoEl=$('oinfo');if(!lotsEl||!otypeEl||!entryEl||!infoEl)return;let l=Number(lotsEl.value||0),pr=otypeEl.value==='market'?price():Number(entryEl.value||price()),m=req(l,pr),n=units(l)*pr;infoEl.innerHTML='Tipo: '+(otypeEl.value==='market'?'Mercado':'Pendiente')+'<br>Activo: '+asset+'<br>Lado: '+side+'<br>Lotes: '+l+'<br>Unidades: '+units(l).toLocaleString()+'<br>Entrada: '+fmt(pr)+'<br>SL: '+(slEl.value||'—')+' · TP: '+(tpEl.value||'—')+'<br>Margen 1:2000: $'+m.toFixed(2)+'<br>Nocional: $'+n.toFixed(2)}function order(){let lotsEl=$('lots'),otypeEl=$('otype'),entryEl=$('entry'),slEl=$('sl'),tpEl=$('tp'),errEl=$('oerr');let l=Number(lotsEl.value),pr=otypeEl.value==='market'?price():Number(entryEl.value||price()),m=req(l,pr);if(!l||l<=0){errEl.style.display='block';errEl.textContent='Volumen inválido';return}if(free()<m){errEl.style.display='block';errEl.textContent='Saldo o margen insuficiente';return}positions.unshift({id:Date.now(),symbol:asset,side,lots:l,orderType:otypeEl.value==='market'?'Mercado':'Pendiente',status:otypeEl.value==='market'?'Abierta':'Pendiente',open:pr,sl:slEl.value||null,tp:tpEl.value||null,margin:m,pnl:0,time:new Date().toLocaleString()});save();tab='open';render()}function tabs(){let box=$('tabbox');if(!box)return;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));if(tab==='open'){$('tabOpen').classList.add('active');box.innerHTML=table(positions.map(o=>[o.symbol,o.side,o.lots,o.orderType,o.status,fmt(o.open),o.sl||'—',o.tp||'—','$'+o.margin.toFixed(2),'<button class="btn red" data-close="'+o.id+'">Cerrar</button>']),['Símbolo','Lado','Lotes','Tipo','Estado','Entrada','SL','TP','Margen',''])}if(tab==='closed'){$('tabClosed').classList.add('active');box.innerHTML=table(closed.map(o=>[o.symbol,o.side,o.lots,fmt(o.open),o.time]),['Símbolo','Lado','Lotes','Entrada','Hora'])}if(tab==='money'){$('tabMoney').classList.add('active');box.innerHTML=table(money.map(m=>[m.type,'$'+m.amount.toFixed(2),m.status,m.time]),['Tipo','Monto','Estado','Fecha'])}box.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>closePos(Number(b.dataset.close)))}function table(r,h){if(!r.length)return'<div class="item">Sin registros</div>';return'<table class="table"><thead><tr>'+h.map(x=>'<th>'+x+'</th>').join('')+'</tr></thead><tbody>'+r.map(row=>'<tr>'+row.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('')+'</tbody></table>'}function closePos(id){let i=positions.findIndex(x=>x.id===id);if(i<0)return;let o=positions.splice(i,1)[0];closed.unshift({...o,time:new Date().toLocaleString()});balance+=o.pnl;save();tab='closed';render()}function moneyForm(type){app.innerHTML='<div class="app"><div class="top"><button id="backBtn" class="btn blue">VOLVER</button><b>'+type+'</b></div><div class="login"><div class="panel" style="width:420px"><h3>Solicitud de '+type+'</h3><input id="amt" class="input" type="number" placeholder="Monto USD"><br><br><button id="okBtn" class="btn green" style="width:100%;padding:12px">CONFIRMAR</button></div></div></div>';$('backBtn').onclick=()=>render();$('okBtn').onclick=()=>{let v=Number($('amt').value);if(!v||v<=0)return;money.unshift({type,amount:v,status:type==='Depósito'?'Pendiente de autorización':'Solicitud pendiente',time:new Date().toLocaleString()});if(type==='Retiro')balance-=v;save();tab='money';render()}}function tick(){tickCount++;A.forEach(a=>{let s=a[0],q=P[s],v=q>1000?.0007:q>100?.00035:.00012,n=Math.max(.00001,q+(Math.random()-.5)*q*v);P[s]=n;TFS.forEach(t=>{let arr=C[key(s,t)];if(!arr||!arr.length)return;let last=arr[arr.length-1];last.c=n;last.h=Math.max(last.h,n);last.l=Math.min(last.l,n);if(tickCount%TICK[t]===0){arr.push({o:last.c,h:n,l:n,c:n});if(arr.length>90)arr.shift()}})});if(page!=='login'){let node=document.querySelector('.price');if(node)node.textContent=fmt(price());draw()}}function draw(){let svg=$('chartSvg');if(!svg)return;let data=C[key(asset,tf)];if(!data||!data.length)return;let W=1000,H=390,L=58,R=84,T=16,B=34,CW=W-L-R,CH=H-T-B,min=Math.min(...data.map(x=>x.l)),max=Math.max(...data.map(x=>x.h)),range=max-min||1,y=v=>T+CH-((v-min)/range)*CH,step=CW/data.length,html='<rect x="0" y="0" width="1000" height="390" fill="#060d1a"/>';for(let i=0;i<=6;i++){let yy=T+i*CH/6,lab=max-i*range/6;html+='<line x1="'+L+'" y1="'+yy+'" x2="'+(W-R)+'" y2="'+yy+'" stroke="#111d30"/><text x="'+(L-6)+'" y="'+(yy+4)+'" fill="#5a6e8a" font-size="11" text-anchor="end">'+fmt(lab)+'</text>'}data.forEach((x,i)=>{let xx=L+i*step+step/2,b=x.c>=x.o,col=b?'#00d4a0':'#f05e5e',t=y(Math.max(x.o,x.c)),bb=y(Math.min(x.o,x.c)),hh=Math.max(bb-t,2),ww=Math.max(step*.55,3);html+='<line x1="'+xx+'" y1="'+y(x.h)+'" x2="'+xx+'" y2="'+y(x.l)+'" stroke="'+col+'"/>';html+=b?'<rect x="'+(xx-ww/2)+'" y="'+t+'" width="'+ww+'" height="'+hh+'" fill="none" stroke="'+col+'"/>':'<rect x="'+(xx-ww/2)+'" y="'+t+'" width="'+ww+'" height="'+hh+'" fill="'+col+'"/>'});let py=y(price());html+='<line x1="'+L+'" y1="'+py+'" x2="'+(W-R)+'" y2="'+py+'" stroke="#63b3ed" stroke-dasharray="5 5"/><rect x="'+(W-R+4)+'" y="'+(py-11)+'" width="76" height="22" fill="#63b3ed"/><text x="'+(W-R+42)+'" y="'+(py+4)+'" fill="#060d1a" font-size="11" font-weight="bold" text-anchor="middle">'+fmt(price())+'</text>';svg.innerHTML=html}init();load();render();setInterval(tick,1000)</script></body></html>
