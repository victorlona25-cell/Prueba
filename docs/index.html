<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WebTrade CRM</title><style>*{box-sizing:border-box}body{margin:0;background:#060d1a;color:#c5d0e8;font-family:Courier New,monospace}.app{height:100vh;display:flex;flex-direction:column}.top{background:#0b1525;border-bottom:1px solid #1a2840;padding:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}.main{flex:1;display:flex;min-height:0}.side{width:220px;background:#050b16;border-right:1px solid #1a2840;overflow:auto}.right{width:260px;background:#050b16;border-left:1px solid #1a2840;overflow:auto}.content{flex:1;padding:12px;min-width:0}.item{padding:11px;border-bottom:1px solid #0d1525;cursor:pointer;color:#5a6e8a}.item.active{background:#0c1e35;color:#63b3ed}.panel{background:#08111e;border:1px solid #1a2840;padding:12px}.btn{background:transparent;border:1px solid #1a2840;color:#3d546e;padding:7px 9px;cursor:pointer;margin:2px}.green{border-color:#00d4a0;color:#00d4a0}.red{border-color:#f05e5e;color:#f05e5e}.blue{border-color:#63b3ed;color:#63b3ed}.yellow{border-color:#f6ad55;color:#f6ad55}.input{width:100%;background:#0d1a2a;border:1px solid #1a2840;color:#c5d0e8;padding:8px}.login{height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at top,#0b1f35,#050b16 70%)}.metric{display:inline-block;text-align:center;margin:0 8px}.metric small{display:block;color:#5a6e8a}.chartBox{height:470px;background:#08111e;border:1px solid #1a2840;padding:10px;display:flex;flex-direction:column}.chartHead{display:flex;justify-content:space-between;margin-bottom:8px}.price{color:#63b3ed;font-size:22px;font-weight:bold}.chartWrap{flex:1;min-height:380px;background:#060d1a;border:1px solid #0d1525}#chart{width:100%;height:100%;display:block}.tabs{display:flex;background:#08111e;border:1px solid #1a2840;border-top:0}.tab{padding:8px 12px;border:0;background:transparent;color:#5a6e8a;cursor:pointer}.tab.active{color:#63b3ed;border-bottom:2px solid #63b3ed}.scroll{height:155px;overflow:auto;background:#08111e;border:1px solid #1a2840;border-top:0}.table{width:100%;border-collapse:collapse}.table td,.table th{border-bottom:1px solid #0d1525;padding:6px;font-size:12px;text-align:left}.warn{background:#1f1606;border:1px solid #f6ad55;color:#f6ad55;padding:8px;margin:8px 0}.error{background:#2a0d0d;border:1px solid #f05e5e;color:#f05e5e;padding:8px;margin:8px 0}@media(max-width:900px){.main{display:block;overflow:auto}.side,.right{width:100%;max-height:230px}.app{height:auto;min-height:100vh}.top{flex-wrap:wrap}.chartBox{height:430px}.chartWrap{min-height:340px}}</style></head><body><div id="app"></div><script>const app=document.getElementById('app');let page='login',asset='EUR/USD',side='BUY',tab='open',balance=1250,positions=[],closed=[],money=[];const A=[['EUR/USD',1.0854],['GBP/USD',1.2687],['USD/JPY',151.34],['XAU/USD',3042.15],['XAG/USD',27.55],['BTC/USD',84210],['ETH/USD',3120],['US30',38200],['NAS100',18200],['AAPL',185],['TSLA',210]];let P={},C={};function init(){A.forEach(a=>{if(!P[a[0]])P[a[0]]=a[1];if(!C[a[0]]){let q=a[1],arr=[];for(let i=0;i<70;i++){let o=q,c=o+(Math.random()-.5)*a[1]*.004,h=Math.max(o,c)+Math.random()*a[1]*.001,l=Math.min(o,c)-Math.random()*a[1]*.001;arr.push({o,h,l,c});q=c}C[a[0]]=arr}})}function price(){return P[asset]||1}function fmt(n){return Number(n||0).toFixed(Number(n)>100?2:5)}function pnl(){return positions.reduce((s,p)=>s+(p.pnl||0),0)}function margin(){return positions.reduce((s,p)=>s+(p.margin||0),0)}function free(){return balance+pnl()-margin()}function size(){if(asset.includes('XAU'))return 100;if(asset.includes('XAG'))return 5000;if(asset.includes('/'))return 100000;return 1}function units(l){return Number(l||0)*size()}function req(l,pr){return units(l)*Number(pr||price())/2000}function save(){localStorage.setItem('webtrade_inline_v1',JSON.stringify({balance,positions,closed,money}))}function load(){try{let s=JSON.parse(localStorage.getItem('webtrade_inline_v1'));if(s){balance=s.balance||1250;positions=s.positions||[];closed=s.closed||[];money=s.money||[]}}catch(e){}}function login(){let u=document.getElementById('u').value,p=document.getElementById('p').value;if((u==='admin'||u==='cliente')&&p==='123456'){page='trade';render()}else{document.getElementById('err').style.display='block'}}function renderLogin(){app.innerHTML='<div class="login"><div class="panel" style="width:380px"><h2 style="color:#00d4a0;text-align:center">FOREX ACCESS</h2><input id="u" class="input" placeholder="Usuario"><br><br><input id="p" class="input" type="password" placeholder="Contraseña"><div id="err" class="error" style="display:none">Credenciales incorrectas</div><br><button id="login" class="btn green" style="width:100%;padding:12px">ENTRAR</button><p style="font-size:11px;color:#5a6e8a;text-align:center">admin / 123456 · cliente / 123456</p></div></div>';document.getElementById('login').onclick=login}function render(){if(page==='login'){renderLogin();return}app.innerHTML='<div class="app"><div class="top"><div><b style="color:#00d4a0">WEBTRADE</b><br><button id="out" class="btn red">CERRAR SESIÓN</button></div><div><button id="dep" class="btn green">+$ DEPÓSITO</button><button id="ret" class="btn yellow">-$ RETIRO</button></div><div>'+[['Balance',balance],['Equity',balance+pnl()],['Margin',margin()],['Free Margin',free()],['P&L',pnl()]].map(x=>'<span class="metric"><small>'+x[0]+'</small><b>$'+x[1].toFixed(2)+'</b></span>').join('')+'</div></div><div class="main"><div class="side" id="assets"></div><div class="content"><div class="chartBox"><div class="chartHead"><div><b>'+asset+'</b><div style="color:#5a6e8a;font-size:11px">Gráfica dinámica · precio simulado</div></div><div class="price">'+fmt(price())+'</div></div><div class="chartWrap"><canvas id="chart"></canvas></div></div><div class="tabs"><button id="to" class="tab">Abiertas</button><button id="tc" class="tab">Cerradas</button><button id="tm" class="tab">Dinero</button></div><div id="tabbox" class="scroll"></div></div><div class="right"><div class="panel"><h3>Nueva orden</h3><div style="display:flex;gap:6px"><button id="buy" class="btn green" style="flex:1">BUY</button><button id="sell" class="btn red" style="flex:1">SELL</button></div><br><label>Tipo de orden</label><select id="otype" class="input"><option value="market">Tiempo de mercado</option><option value="pending">Cuando llegue a precio</option></select><br><br><label>Precio entrada</label><input id="entry" class="input" type="number" value="'+price()+'"><br><br><label>Lotes</label><input id="lots" class="input" type="number" step="0.01" value="0.01"><br><br><label>Stop Loss</label><input id="sl" class="input" type="number" placeholder="Opcional"><br><br><label>Take Profit</label><input id="tp" class="input" type="number" placeholder="Opcional"><div id="oinfo" class="warn"></div><div id="oerr" class="error" style="display:none"></div><button id="exec" class="btn blue" style="width:100%;padding:10px">CONFIRMAR '+side+'</button></div></div></div></div>';out.onclick=()=>{page='login';render()};dep.onclick=()=>moneyForm('Depósito');ret.onclick=()=>moneyForm('Retiro');buy.onclick=()=>{side='BUY';render()};sell.onclick=()=>{side='SELL';render()};exec.onclick=order;['otype','entry','lots','sl','tp'].forEach(id=>document.getElementById(id).oninput=orderInfo);to.onclick=()=>{tab='open';tabs()};tc.onclick=()=>{tab='closed';tabs()};tm.onclick=()=>{tab='money';tabs()};let list=document.getElementById('assets');A.forEach(a=>{let d=document.createElement('div');d.className='item '+(a[0]===asset?'active':'');d.innerHTML=a[0]+'<br><small>'+fmt(P[a[0]]||a[1])+'</small>';d.onclick=()=>{asset=a[0];render()};list.appendChild(d)});orderInfo();draw();tabs()}function orderInfo(){let l=Number(lots.value||0),pr=otype.value==='market'?price():Number(entry.value||price()),m=req(l,pr),n=units(l)*pr;oinfo.innerHTML='Tipo: '+(otype.value==='market'?'Mercado':'Pendiente')+'<br>Activo: '+asset+'<br>Lado: '+side+'<br>Lotes: '+l+'<br>Unidades: '+units(l).toLocaleString()+'<br>Entrada: '+fmt(pr)+'<br>SL: '+(sl.value||'—')+' · TP: '+(tp.value||'—')+'<br>Margen 1:2000: $'+m.toFixed(2)+'<br>Nocional: $'+n.toFixed(2)}function order(){let l=Number(lots.value),pr=otype.value==='market'?price():Number(entry.value||price()),m=req(l,pr);if(!l||l<=0){oerr.style.display='block';oerr.textContent='Volumen inválido';return}if(free()<m){oerr.style.display='block';oerr.textContent='Saldo o margen insuficiente';return}positions.unshift({id:Date.now(),symbol:asset,side,lots:l,orderType:otype.value==='market'?'Mercado':'Pendiente',status:otype.value==='market'?'Abierta':'Pendiente',open:pr,sl:sl.value||null,tp:tp.value||null,margin:m,pnl:0,time:new Date().toLocaleString()});save();tab='open';render()}function tabs(){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));let box=tabbox;if(tab==='open'){to.classList.add('active');box.innerHTML=table(positions.map(o=>[o.symbol,o.side,o.lots,o.orderType,o.status,fmt(o.open),o.sl||'—',o.tp||'—','$'+o.margin.toFixed(2),'<button class="btn red" data-close="'+o.id+'">Cerrar</button>']),['Símbolo','Lado','Lotes','Tipo','Estado','Entrada','SL','TP','Margen',''])}if(tab==='closed'){tc.classList.add('active');box.innerHTML=table(closed.map(o=>[o.symbol,o.side,o.lots,fmt(o.open),o.time]),['Símbolo','Lado','Lotes','Entrada','Hora'])}if(tab==='money'){tm.classList.add('active');box.innerHTML=table(money.map(m=>[m.type,'$'+m.amount.toFixed(2),m.status,m.time]),['Tipo','Monto','Estado','Fecha'])}box.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>closePos(Number(b.dataset.close)))}function table(r,h){if(!r.length)return'<div class="item">Sin registros</div>';return'<table class="table"><thead><tr>'+h.map(x=>'<th>'+x+'</th>').join('')+'</tr></thead><tbody>'+r.map(row=>'<tr>'+row.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('')+'</tbody></table>'}function closePos(id){let i=positions.findIndex(x=>x.id===id);if(i<0)return;let o=positions.splice(i,1)[0];closed.unshift({...o,time:new Date().toLocaleString()});balance+=o.pnl;save();tab='closed';render()}function moneyForm(type){app.innerHTML='<div class="app"><div class="top"><button id="back" class="btn blue">VOLVER</button><b>'+type+'</b></div><div class="login"><div class="panel" style="width:420px"><h3>Solicitud de '+type+'</h3><input id="amt" class="input" type="number" placeholder="Monto USD"><br><br><button id="ok" class="btn green" style="width:100%;padding:12px">CONFIRMAR</button></div></div></div>';back.onclick=()=>render();ok.onclick=()=>{let v=Number(amt.value);if(!v||v<=0)return;money.unshift({type,amount:v,status:type==='Depósito'?'Pendiente de autorización':'Solicitud pendiente',time:new Date().toLocaleString()});if(type==='Retiro')balance-=v;save();tab='money';render()}}function tick(){A.forEach(a=>{let s=a[0],q=P[s],v=q>1000?.0007:q>100?.00035:.00012,n=Math.max(.00001,q+(Math.random()-.5)*q*v);P[s]=n;let arr=C[s],last=arr[arr.length-1];last.c=n;last.h=Math.max(last.h,n);last.l=Math.min(last.l,n);if(Math.random()>.8){arr.push({o:last.c,h:n,l:n,c:n});if(arr.length>90)arr.shift()}});if(page!=='login'){let node=document.querySelector('.price');if(node)node.textContent=fmt(price());draw()}}function draw(){let c=document.getElementById('chart');if(!c)return;let r=c.parentElement.getBoundingClientRect(),d=devicePixelRatio||1,W=Math.max(500,Math.floor(r.width)),H=Math.max(300,Math.floor(r.height));c.width=W*d;c.height=H*d;c.style.width=W+'px';c.style.height=H+'px';let ctx=c.getContext('2d');ctx.setTransform(d,0,0,d,0,0);ctx.fillStyle='#060d1a';ctx.fillRect(0,0,W,H);let data=C[asset],L=58,R=84,T=16,B=34,CW=W-L-R,CH=H-T-B,min=Math.min(...data.map(x=>x.l)),max=Math.max(...data.map(x=>x.h)),range=max-min||1,y=v=>T+CH-((v-min)/range)*CH;for(let i=0;i<=6;i++){let yy=T+i*CH/6;ctx.strokeStyle='#111d30';ctx.beginPath();ctx.moveTo(L,yy);ctx.lineTo(W-R,yy);ctx.stroke();let lab=max-i*range/6;ctx.fillStyle='#5a6e8a';ctx.font='11px Courier New';ctx.textAlign='right';ctx.fillText(fmt(lab),L-6,yy+4)}let step=CW/data.length;data.forEach((x,i)=>{let xx=L+i*step+step/2,b=x.c>=x.o,col=b?'#00d4a0':'#f05e5e';ctx.strokeStyle=col;ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(xx,y(x.h));ctx.lineTo(xx,y(x.l));ctx.stroke();let t=y(Math.max(x.o,x.c)),bb=y(Math.min(x.o,x.c)),hh=Math.max(bb-t,2),ww=Math.max(step*.55,3);b?ctx.strokeRect(xx-ww/2,t,ww,hh):ctx.fillRect(xx-ww/2,t,ww,hh)});let py=y(price());ctx.setLineDash([5,5]);ctx.strokeStyle='#63b3ed';ctx.beginPath();ctx.moveTo(L,py);ctx.lineTo(W-R,py);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#63b3ed';ctx.fillRect(W-R+4,py-11,R-8,22);ctx.fillStyle='#060d1a';ctx.font='bold 11px Courier New';ctx.textAlign='center';ctx.fillText(fmt(price()),W-R/2+3,py+4)}init();load();render();setInterval(tick,1000)</script></body></html>
