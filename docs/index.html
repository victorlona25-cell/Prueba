<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WebTrade CRM</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#060d1a;color:#c5d0e8;font-family:'Courier New',monospace}.app{height:100vh;display:flex;flex-direction:column}.top{background:#0b1525;border-bottom:1px solid #1a2840;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}.btn{background:transparent;border:1px solid #1a2840;color:#3d546e;padding:6px 10px;cursor:pointer}.green{border-color:#00d4a0;color:#00d4a0}.red{border-color:#f05e5e;color:#f05e5e}.blue{border-color:#63b3ed;color:#63b3ed}.login{height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at top,#0b1f35,#050b16 70%)}.card,.panel{background:#08111e;border:1px solid #1a2840;padding:18px}.input{width:100%;background:#0d1a2a;border:1px solid #1a2840;color:#c5d0e8;padding:9px}.main{flex:1;display:flex;overflow:hidden}.side{width:230px;background:#050b16;border-right:1px solid #1a2840;overflow:auto}.item{padding:11px;border-bottom:1px solid #0d1525;cursor:pointer;color:#5a6e8a}.item.active{background:#0c1e35;color:#63b3ed}.content{flex:1;padding:15px;overflow:hidden}.metric{text-align:center}.metric small{display:block;color:#5a6e8a}.error{background:#2a0d0d;border:1px solid #f05e5e;color:#f05e5e;padding:8px;margin:8px 0}.chartBox{height:calc(100vh - 210px);min-height:360px;background:#08111e;border:1px solid #1a2840;padding:10px}.chartHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.price{color:#63b3ed;font-size:22px;font-weight:bold}canvas{width:100%;height:100%;display:block;background:#060d1a}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const app=document.getElementById('app');
let page='login',currentModule='Dashboard',selectedAsset='EUR/USD';
const modules=['Dashboard','Clientes','Cuentas trading','Depósitos','Retiros','Créditos / Bonos','Operaciones','CRM','Riesgo','Reportes','Configuración','Usuarios admin','Auditoría'];
const assets=[['EUR/USD',1.0854],['GBP/USD',1.2687],['USD/JPY',151.34],['XAU/USD',3042.15],['BTC/USD',84210],['US30',38200],['NAS100',18200],['AAPL',185],['TSLA',210]];
function price(){return assets.find(a=>a[0]===selectedAsset)?.[1]||1}
function go(p){page=p;render()}
function doLogin(){const u=document.getElementById('u').value.trim();const p=document.getElementById('p').value.trim();if(u==='admin'&&p==='123456'){go('admin');return}if(u==='cliente'&&p==='123456'){go('trade');return}document.getElementById('err').innerText='Credenciales incorrectas o vacías.'}
function renderLogin(){app.innerHTML='<div class="login"><div class="card" style="width:390px"><h2 style="color:#00d4a0;text-align:center">FOREX ACCESS</h2><p style="text-align:center;color:#5a6e8a">WebTrade + CRM</p><input id="u" class="input" placeholder="Usuario"><br><br><input id="p" class="input" type="password" placeholder="Contraseña"><div id="err" class="error" style="min-height:32px"></div><button class="btn green" style="width:100%;padding:12px" onclick="doLogin()">ENTRAR</button><p style="font-size:11px;color:#5a6e8a;text-align:center">Admin: admin / 123456 · Cliente: cliente / 123456</p><p style="font-size:10px;color:#5a6e8a;text-align:center">El trading conlleva riesgo. Puedes perder todo tu capital.</p></div></div>'}
function renderAdmin(){app.innerHTML='<div class="app"><div class="top"><div><b style="color:#00d4a0">ADMIN CRM</b><br><button class="btn red" onclick="go(\'login\')">CERRAR SESIÓN</button></div><b>'+currentModule+'</b></div><div class="main"><div class="side">'+modules.map(m=>'<div class="item '+(m===currentModule?'active':'')+'" onclick="currentModule=\''+m+'\';render()">'+m+'</div>').join('')+'</div><div class="content" style="overflow:auto"><div class="panel"><h2 style="color:#63b3ed">'+currentModule+'</h2><div class="grid"><div class="panel">Crear / editar registros</div><div class="panel">Estados y validaciones</div><div class="panel">Historial de actividad</div><div class="panel">Auditoría futura</div></div></div>'+(currentModule==='Clientes'?'<div class="panel" style="margin-top:12px"><h3>Cliente Demo</h3><p>Usuario: cliente</p><p>Estado: Activo</p><p>KYC: Pendiente</p><p>Asesor: Víctor</p></div>':'')+'</div></div></div>'}
function renderTrade(){app.innerHTML='<div class="app"><div class="top"><div><b style="color:#00d4a0">WEBTRADE</b><br><button class="btn red" onclick="go(\'login\')">CERRAR SESIÓN</button></div><div>'+['Balance','Equity','Margin','Free Margin','P&L'].map((m,i)=>'<span class="metric" style="display:inline-block;margin:0 10px"><small>'+m+'</small><b>$'+((i===0||i===1||i===3)?'1250.00':'0.00')+'</b></span>').join('')+'</div></div><div class="main"><div class="side">'+assets.map(a=>'<div class="item '+(a[0]===selectedAsset?'active':'')+'" onclick="selectedAsset=\''+a[0]+'\';render()">'+a[0]+'</div>').join('')+'</div><div class="content"><div class="chartBox"><div class="chartHead"><div><b>'+selectedAsset+'</b><div style="color:#5a6e8a;font-size:11px">Velas japonesas simuladas · M5</div></div><div class="price">'+price()+'</div></div><canvas id="chart" width="1000" height="520"></canvas></div></div><div class="side" style="border-left:1px solid #1a2840;border-right:none"><div class="panel"><h3>Nueva orden</h3><button class="btn green">BUY</button> <button class="btn red">SELL</button><br><br><input class="input" value="0.01"><br><br><button class="btn blue" style="width:100%">EJECUTAR</button></div></div></div></div>';setTimeout(drawChart,50)}
function drawChart(){const c=document.getElementById('chart');if(!c)return;const ctx=c.getContext('2d'),W=c.width,H=c.height;ctx.clearRect(0,0,W,H);ctx.fillStyle='#060d1a';ctx.fillRect(0,0,W,H);const left=55,right=70,top=20,bottom=40,cw=W-left-right,ch=H-top-bottom;let base=price(),data=[],p=base;for(let i=0;i<70;i++){let o=p;let change=(Math.random()-0.48)*base*0.004;let close=o+change;let high=Math.max(o,close)+Math.random()*base*0.0015;let low=Math.min(o,close)-Math.random()*base*0.0015;data.push({o,close,high,low});p=close}let min=Math.min(...data.map(d=>d.low)),max=Math.max(...data.map(d=>d.high)),range=max-min||1;function y(v){return top+ch-((v-min)/range)*ch}for(let i=0;i<=6;i++){let yy=top+i*ch/6;ctx.strokeStyle='#111d30';ctx.beginPath();ctx.moveTo(left,yy);ctx.lineTo(W-right,yy);ctx.stroke();let label=max-i*range/6;ctx.fillStyle='#5a6e8a';ctx.font='12px Courier New';ctx.textAlign='right';ctx.fillText(label.toFixed(base>100?2:5),left-6,yy+4)}let step=cw/data.length;data.forEach((d,i)=>{let x=left+i*step+step/2;let bull=d.close>=d.o;let col=bull?'#00d4a0':'#f05e5e';ctx.strokeStyle=col;ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(x,y(d.high));ctx.lineTo(x,y(d.low));ctx.stroke();let topBody=y(Math.max(d.o,d.close)),botBody=y(Math.min(d.o,d.close));let h=Math.max(botBody-topBody,2),w=Math.max(step*.55,3);bull?ctx.strokeRect(x-w/2,topBody,w,h):ctx.fillRect(x-w/2,topBody,w,h)});ctx.strokeStyle='#f6ad55';ctx.beginPath();for(let i=19;i<data.length;i++){let avg=data.slice(i-19,i+1).reduce((s,d)=>s+d.close,0)/20;let x=left+i*step+step/2;i===19?ctx.moveTo(x,y(avg)):ctx.lineTo(x,y(avg))}ctx.stroke();ctx.strokeStyle='#63b3ed';ctx.setLineDash([4,4]);let ly=y(data[data.length-1].close);ctx.beginPath();ctx.moveTo(left,ly);ctx.lineTo(W-right,ly);ctx.stroke();ctx.setLineDash([])}
function render(){if(page==='login')renderLogin();else if(page==='admin')renderAdmin();else renderTrade()}
render();
</script>
</body>
</html>
